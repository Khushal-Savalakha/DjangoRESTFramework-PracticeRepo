services:
  project-health-check:
    build:
      context: .
      dockerfile: Containerfile
    container_name: project-health-check
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py collectstatic --noinput &&
               gunicorn -w 4 core.wsgi:application --bind 0.0.0.0:8000 --max-requests 1200 --max-requests-jitter 1000"
    volumes:
      - .:/app:Z
      - ./staticfiles:/app/staticfiles:Z
      - ./static:/app/static:Z
      - ./media:/app/media:Z
    ports:
      - "${API_PORT}:8000"
    env_file:
      - .env
    restart: always
    networks:
      - project-health-check-net

  project-health-check-celery:
    build:
      context: .
      dockerfile: Containerfile
    container_name: project-health-check-celery
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app:Z
    restart: always
    networks:
      - project-health-check-net

  project-health-check-beat:
    build:
      context: .
      dockerfile: Containerfile
    container_name: project-health-check-beat
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app:Z
    restart: always
    networks:
      - project-health-check-net
  
  project-health-check-redis:
    image: redis:7-alpine
    container_name: project-health-check-redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - project-health-check-net

networks:
  project-health-check-net:
    driver: bridge
